services:
  db:
    image: postgres:16-alpine
    container_name: testequestor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testequestor
    ports:
      - "5432:5432"
    volumes:
      - testequestor-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testequestor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  testequestor-db-data:
